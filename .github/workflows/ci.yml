name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: finance
          POSTGRES_DB: finance_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance -d finance_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://finance:finance@localhost:5432/finance_tracker
      AUTH_SECRET: ci-test-secret-min-16-chars

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run build
